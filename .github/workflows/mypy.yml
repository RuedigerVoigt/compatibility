name: Mypy (type checking)

on: [push, pull_request]

# Least-privilege token: this workflow only reads the repository.
permissions:
  contents: read

# Cancel superseded runs on the same ref so rapid pushes don't pile up
# redundant CI matrices.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.14']

    steps:
    - name: APT Update
      run: sudo apt update
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install package and dev dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    - name: Check code with Mypy
      # Drive the analysis target from the matrix so each job type-checks the
      # code against that Python version (overrides python_version in pyproject).
      run: mypy --python-version ${{ matrix.python-version }} compatibility
