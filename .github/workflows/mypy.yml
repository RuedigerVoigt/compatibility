name: Mypy (type checking)

on: [push, pull_request]

# Least-privilege token: this workflow only reads the repository.
permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.14']

    steps:
    - name: APT Update
      run: sudo apt update
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install package and dev dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    - name: Check code with Mypy
      # Drive the analysis target from the matrix so each job type-checks the
      # code against that Python version (overrides python_version in pyproject).
      run: mypy --python-version ${{ matrix.python-version }} compatibility
