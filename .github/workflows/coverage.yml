name: Coverage Check

on: [push, pull_request]

# Least-privilege token: this workflow only reads the repository.
permissions:
  contents: read

# Cancel superseded runs on the same ref so rapid pushes don't pile up
# redundant CI matrices.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
    - name: Set up Python 3.14
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.14'

    - name: Install package and dev dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Compile translations
      run: python compile_translations.py

    - name: Run tests with coverage check (minimum 100%)
      run: pytest --cov=compatibility --cov-fail-under=100 tests/
