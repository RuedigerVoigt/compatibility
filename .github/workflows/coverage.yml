name: Coverage Check

on: [push, pull_request]

# Least-privilege token: this workflow only reads the repository.
permissions:
  contents: read

# Cancel superseded runs on the same ref so rapid pushes don't pile up
# redundant CI matrices.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Set up Python 3.14
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: '3.14'

    - name: Install package and dev dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Compile translations
      run: python compile_translations.py

    - name: Run tests with coverage check (minimum 100%)
      run: pytest --cov=compatibility --cov-fail-under=100 tests/
