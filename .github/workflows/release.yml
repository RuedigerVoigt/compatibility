name: Release / Publish to PyPI

on:
  release:
    types: [published]


jobs:
  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    if: github.event.release.target_commitish == 'main'
    # Specifying a GitHub environment is optional, but strongly encouraged
    environment: pypi
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry

      - name: Compile translations
        run: python compile_translations.py

      - name: Build package
        run: poetry build

      - name: Verify translations are packaged
        # Fail the release if the compiled .mo catalogs are missing from the
        # built wheel. Without this guard a gitignore/packaging mistake would
        # silently ship a distribution with no translations (gettext then
        # falls back to English).
        run: |
          python - <<'EOF'
          import glob, sys, zipfile
          wheel = glob.glob('dist/*.whl')[0]
          mo = [n for n in zipfile.ZipFile(wheel).namelist() if n.endswith('.mo')]
          print('Compiled catalogs in wheel:', mo)
          if not mo:
              sys.exit('ERROR: no .mo translation files found in the built wheel')
          EOF

      - name: Install Twine
        run: pip install twine

      - name: Validate built distributions with Twine
        run: twine check dist/*

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
