name: Release / Publish to PyPI

on:
  release:
    types: [published]


jobs:
  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    if: github.event.release.target_commitish == 'main'
    # Specifying a GitHub environment is optional, but strongly encouraged
    environment: pypi
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry

      - name: Compile translations
        run: python compile_translations.py

      - name: Build package
        run: poetry build

      - name: Verify wheel and sdist contents
        # Fail the release if the compiled .mo catalogs or the py.typed marker
        # are missing from either built artifact. Without this guard a
        # gitignore/packaging mistake would silently ship a distribution with no
        # translations (gettext then falls back to English) or without the PEP
        # 561 typing marker.
        run: |
          python - <<'EOF'
          import glob, sys, tarfile, zipfile

          required = [
              'compatibility/locales/de/LC_MESSAGES/compatibility.mo',
              'compatibility/locales/fr/LC_MESSAGES/compatibility.mo',
              'compatibility/locales/nl/LC_MESSAGES/compatibility.mo',
              'compatibility/locales/es/LC_MESSAGES/compatibility.mo',
              'compatibility/py.typed',
          ]

          def names(path):
              if path.endswith('.whl'):
                  return zipfile.ZipFile(path).namelist()
              with tarfile.open(path, 'r:gz') as tar:
                  return tar.getnames()

          artifacts = sorted(glob.glob('dist/*.whl') + glob.glob('dist/*.tar.gz'))
          if not any(p.endswith('.whl') for p in artifacts):
              sys.exit('ERROR: no wheel found in dist/')
          if not any(p.endswith('.tar.gz') for p in artifacts):
              sys.exit('ERROR: no sdist found in dist/')

          errors = []
          for path in artifacts:
              entries = names(path)
              for suffix in required:
                  if any(n.endswith(suffix) for n in entries):
                      print(f'OK: {path} contains {suffix}')
                  else:
                      errors.append(f'{path} is missing {suffix}')

          if errors:
              sys.exit('ERROR: ' + '; '.join(errors))
          print('All required files present in wheel and sdist.')
          EOF

      - name: Install Twine
        run: pip install twine

      - name: Validate built distributions with Twine
        run: twine check dist/*

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
