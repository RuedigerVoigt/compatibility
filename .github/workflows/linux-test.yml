# This workflow runs Unit-Tests for compatibility on Linux
# with a variety of Python versions.

name: Linux Test

on: [push, pull_request]

# Least-privilege token: this workflow only reads the repository.
permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest
    # Allow the experimental Python 3.15 beta job to fail without failing CI.
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: true
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        experimental: [false]
        # Also run against the Python 3.15 beta to catch breakage early. This
        # entry is marked experimental, so via continue-on-error its failure
        # does not fail the workflow.
        include:
          - python-version: '3.15'
            experimental: true

    steps:
    - name: APT Update
      run: sudo apt update

    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true

    - name: Install package and dev dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Compile translations
      run: python compile_translations.py

    - name: Test with pytest
      run: pytest tests/
