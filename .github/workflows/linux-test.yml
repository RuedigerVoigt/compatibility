# This workflow runs Unit-Tests for compatibility on Linux
# with a variety of Python versions.

name: Linux Test

on: [push, pull_request]

jobs:
  build:

    runs-on: ubuntu-latest
    # Allow the experimental Python 3.15 beta job to fail without failing CI.
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: true
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        experimental: [false]
        # Also run against the Python 3.15 beta to catch breakage early. This
        # entry is marked experimental, so via continue-on-error its failure
        # does not fail the workflow.
        include:
          - python-version: '3.15'
            experimental: true

    steps:
    - name: APT Update
      run: sudo apt update

    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true

    - name: Install dependencies and test tools
      run: |
        python -m pip install --upgrade pip
        python -m pip install pytest

    - name: Install package
      run: pip install -e .

    - name: Compile translations
      run: python compile_translations.py

    - name: Test with pytest
      run: pytest tests/
