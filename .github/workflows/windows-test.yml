# This workflow runs Unit-Tests for compatibility on Windows
# with the oldest and latest supported Python version.


name: Windows Test

on: [push, pull_request]

# Least-privilege token: this workflow only reads the repository.
permissions:
  contents: read

# Cancel superseded runs on the same ref so rapid pushes don't pile up
# redundant CI matrices.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:

    runs-on: windows-latest
    # Allow the experimental Python 3.15 beta job to fail without failing CI.
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: true
      matrix:
        python-version: ['3.10', '3.14']
        experimental: [false]
        # Also run against the Python 3.15 beta to catch breakage early. This
        # entry is marked experimental, so via continue-on-error its failure
        # does not fail the workflow.
        include:
          - python-version: '3.15'
            experimental: true

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true

    - name: Install package and dev dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Compile translations
      run: python compile_translations.py

    - name: Test with pytest
      run: pytest tests/