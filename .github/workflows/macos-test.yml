# This workflow runs Unit-Tests for compatibility on MacOS
# with the latest supported Python version.


name: MacOS Test

on: [push, pull_request]

# Least-privilege token: this workflow only reads the repository.
permissions:
  contents: read

# Cancel superseded runs on the same ref so rapid pushes don't pile up
# redundant CI matrices.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:

    runs-on: macos-latest
    # Allow the experimental Python 3.15 beta job to fail without failing CI.
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: true
      matrix:
        python-version: ['3.14']
        experimental: [false]
        # Also run against the Python 3.15 beta to catch breakage early. This
        # entry is marked experimental, so via continue-on-error its failure
        # does not fail the workflow.
        include:
          - python-version: '3.15'
            experimental: true

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true

    - name: Install package and dev dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Compile translations
      run: python compile_translations.py

    - name: Test with pytest
      run: pytest tests/
